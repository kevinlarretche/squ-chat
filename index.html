<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SQU — Ask anything</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f8f8f6; display: flex; flex-direction: column; height: 100vh; }
.header { background: #1a1a2e; padding: 16px 20px; display: flex; align-items: center; gap: 12px; }
.header-logo { font-size: 22px; font-weight: 900; color: white; letter-spacing: -1px; }
.header-logo span { color: #5DCAA5; }
.header-sub { font-size: 12px; color: #5DCAA5; letter-spacing: 2px; text-transform: uppercase; }
.chat-window { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
.message { max-width: 80%; padding: 12px 16px; border-radius: 16px; font-size: 15px; line-height: 1.5; }
.message.bot { background: white; color: #1a1a2e; border: 0.5px solid #e0e0e0; align-self: flex-start; border-bottom-left-radius: 4px; }
.message.user { background: #1a1a2e; color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
.message.typing { background: white; border: 0.5px solid #e0e0e0; align-self: flex-start; padding: 16px; }
.typing-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #5DCAA5; animation: bounce 1.2s infinite; margin: 0 2px; }
.typing-dot:nth-child(2) { animation-delay: 0.2s; }
.typing-dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes bounce { 0%, 60%, 100% { transform: translateY(0); } 30% { transform: translateY(-6px); } }
.input-bar { background: white; border-top: 0.5px solid #e0e0e0; padding: 16px 20px; display: flex; gap: 12px; align-items: center; }
.input-bar input { flex: 1; border: 0.5px solid #e0e0e0; border-radius: 24px; padding: 12px 18px; font-size: 15px; outline: none; background: #f8f8f6; }
.input-bar input:focus { border-color: #5DCAA5; }
.send-btn { background: #1a1a2e; color: white; border: none; border-radius: 50%; width: 44px; height: 44px; cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; }
.send-btn:hover { background: #5DCAA5; }
.powered { text-align: center; font-size: 11px; color: #aaa; padding: 8px; }
</style>
</head>
<body>
<div class="header">
  <div>
    <div class="header-logo">S<span>Q</span>U</div>
    <div class="header-sub">No stupid questions</div>
  </div>
</div>
<div class="chat-window" id="chat">
  <div class="message bot">👋 Hey! I'm SQU. No question is too stupid — ask me anything about this product!</div>
</div>
<div class="input-bar">
  <input type="text" id="input" placeholder="Ask anything..." />
  <button class="send-btn" id="send-btn">&#10148;</button>
</div>
<div class="powered">Powered by SQU</div>
<script>
const params = new URLSearchParams(window.location.search);
const productId = params.get('product') || 'apricot_01';
const chatId = 'web_' + Math.random().toString(36).substr(2, 9);
const input = document.getElementById('input');
const chat = document.getElementById('chat');

function addMessage(text, type) {
  const div = document.createElement('div');
  div.className = 'message ' + type;
  div.textContent = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return div;
}

function showTyping() {
  const div = document.createElement('div');
  div.className = 'message typing';
  div.id = 'typing';
  div.innerHTML = '<span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span>';
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById('typing');
  if (t) t.remove();
}

async function sendMessage() {
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  addMessage(text, 'user');
  showTyping();
  try {
    const res = await fetch('https://n8n.srv1208833.hstgr.cloud/webhook-test/squ-chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text, productId, chatId })
    });
    const data = await res.json();
    removeTyping();
    addMessage(data.reply, 'bot');
  } catch(e) {
    removeTyping();
    addMessage('Sorry, something went wrong. Please try again!', 'bot');
  }
}

document.getElementById('send-btn').addEventListener('click', sendMessage);
input.addEventListener('keypress', e => { if (e.key === 'Enter') sendMessage(); });
</script>
</body>
</html>
